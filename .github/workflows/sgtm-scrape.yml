name: SGTM live price scrape

on:
  # Séance Bourse de Casablanca (BVC) : 9h30 → 15h30 heure Casablanca, lundi-vendredi.
  # Maroc = UTC+1 toute l'année depuis 2018 (heure légale marocaine, DST permanent).
  # Exception : pendant le Ramadan (~30 jours/an, dates lunaires), Maroc passe à UTC+0.
  #
  # Mapping UTC (hors Ramadan) :
  #   9h30 Casablanca = 8h30 UTC (ouverture)
  #   15h30 Casablanca = 14h30 UTC (clôture)
  #
  # Cron choisi : `30 8-14 * * 1-5` → 7 runs à :30 de chaque heure entre 8h30 et 14h30 UTC.
  #   - Capture l'ouverture (run 8h30 UTC)
  #   - 5 runs intraday (9h30, 10h30, 11h30, 12h30, 13h30 UTC)
  #   - Capture la clôture (run 14h30 UTC)
  # Les délais GitHub Actions (jusqu'à ~15 min) sont absorbés par la marge de :30 :
  # un run "ouverture" qui fire à 8h42 UTC tombe à 9h42 local = 12 min après l'ouverture.
  #
  # Pendant le Ramadan (UTC+0) la séance est 9h30-15h30 UTC : on manquerait la dernière
  # heure (14h30-15h30). Acceptable : le badge "dernier relevé" gère la staleness, et on
  # pourra étendre temporairement si nécessaire (~30 jours/an).
  schedule:
    - cron: '30 8-14 * * 1-5'
  # Manuel (test, debug) + sur push du script
  workflow_dispatch:
  push:
    paths:
      - 'scripts/scrape_sgtm.py'
      - '.github/workflows/sgtm-scrape.yml'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Pas de `cache: pip` car pas de requirements.txt committé — évite
          # l'erreur "No file matched to [pip]" qui fait échouer le job en 3s.

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.48.0

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.48.0-${{ runner.os }}

      - name: Install Chromium (if cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Install system deps for Chromium (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Scrape SGTM
        id: scrape
        env:
          DEBUG_DIR: ${{ runner.temp }}/scrape_debug
        run: |
          python scripts/scrape_sgtm.py
        continue-on-error: true

      - name: Upload debug artifacts on failure
        if: steps.scrape.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-${{ github.run_id }}
          path: ${{ runner.temp }}/scrape_debug
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated price
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sgtm_live.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            PRICE=$(python -c "import json; print(json.load(open('data/sgtm_live.json'))['priceMAD'])")
            SOURCE=$(python -c "import json; print(json.load(open('data/sgtm_live.json'))['source'])")
            git commit -m "chore(sgtm): live price ${PRICE} MAD (source: ${SOURCE})"
            git push
          fi
